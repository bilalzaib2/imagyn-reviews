# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "8f84af74377630a28899e60d2a32b753"
name = "imagyn-reviews"
application_url = "https://imagyn-reviews-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://imagyn-reviews-production.up.railway.app/api/reviews"
subpath = "reviews"
prefix = "apps"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

# fulfillments/create is intentionally NOT subscribed here. Shopify rejected deployment with
# "This app is not approved to subscribe to webhook topics containing protected customer
# data" — the topic's payload (destination address, customer email) requires completing
# Shopify's Protected Customer Data approval first (https://shopify.dev/docs/apps/launch/
# protected-customer-data), which this app has not done. The handler
# (app/routes/webhooks.fulfillments.create.tsx), scope, and Settings UI all still exist and
# are gated off by ORDER_AUTOMATION_ENABLED (app/config/features.server.ts) — re-add the
# subscription and scope below, and flip that flag, once approval is granted. See
# docs/DECISIONS.md.
#
#   [[webhooks.subscriptions]]
#   uri = "/webhooks/fulfillments/create"
#   topics = [ "fulfillments/create" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_fulfillments (required for the fulfillments/create webhook) is deliberately not
# requested yet — see the comment above; add it back alongside the webhook subscription once
# Protected Customer Data approval is granted.
scopes = "write_products,write_metaobjects,write_metaobject_definitions,write_files,read_files"

[auth]
redirect_urls = [
  "https://imagyn-reviews-production.up.railway.app/auth/callback",
  "https://imagyn-reviews-production.up.railway.app/auth/shopify/callback",
  "https://imagyn-reviews-production.up.railway.app/api/auth/callback"
]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

# Written by app/services/structuredData/sync.server.ts (namespace "$app", key
# "reviews_jsonld" — verified against shopify.dev that TOML's [product.metafields.app.*]
# maps to the literal "$app" GraphQL namespace, not "app") whenever a product's approved
# review data changes. Read directly by extensions/imagyn-review-widgets/blocks/
# star_rating.liquid to render a server-side JSON-LD <script> tag with zero extra
# request. storefront = "public_read" is required for Liquid to see it at all.
[product.metafields.app.reviews_jsonld]
type = "json"
name = "Reviews Structured Data"
description = "Server-synced schema.org Product/AggregateRating/Review JSON-LD for search engine rich snippets. Written by the app; never edited by merchants."

  [product.metafields.app.reviews_jsonld.access]
  admin = "merchant_read"
  storefront = "public_read"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
